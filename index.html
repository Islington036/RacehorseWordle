<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Racehorse Wordle</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles/base.css?v=20260606a">
  <link rel="stylesheet" href="styles/layout.css?v=20260606a">
  <link rel="stylesheet" href="styles/tiles.css?v=20260606a">
  <script defer src="data/questions.embedded.js?v=20260606a"></script>
  <script defer src="src/config.js?v=20260606a"></script>
  <script defer src="src/normalize.js?v=20260606a"></script>
  <script defer src="src/evaluator.js?v=20260606a"></script>
  <script defer src="src/kana-input.js?v=20260606a"></script>
  <script defer src="src/storage.js?v=20260606a"></script>
  <script defer src="src/options.js?v=20260606a"></script>
  <script defer src="src/question-picker.js?v=20260606a"></script>
  <script defer src="src/game-state.js?v=20260606a"></script>
  <script defer src="src/app-session.js?v=20260606a"></script>
  <script defer src="src/ui/constants.js?v=20260606a"></script>
  <script defer src="src/ui/renderers.js?v=20260606a"></script>
  <script defer src="src/ui/coordinator.js?v=20260606a"></script>
  <script defer src="src/main.js?v=20260606a"></script>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button id="options-button" class="icon-button" type="button" aria-label="オプションを表示" title="オプション">
        <span aria-hidden="true">⚙</span>
      </button>
      <h1>Racehorse Wordle</h1>
      <button id="reset-button" class="icon-button" type="button" aria-label="別の問題を出題" title="別の問題">
        <span aria-hidden="true">↻</span>
      </button>
    </header>

    <div id="toast" class="toast" hidden></div>

    <main class="game-layout">
      <section class="play-area" aria-label="ゲーム">
        <div class="board-block horse-block">
          <div class="section-heading history-heading">
            <div id="history-tabs" class="history-tabs" role="tablist" aria-label="判定履歴">
              <button type="button" role="tab" data-history-target="horse" aria-selected="true">馬名</button>
              <button type="button" role="tab" data-history-target="sire" aria-selected="false">父名</button>
              <button type="button" role="tab" data-history-target="dam" aria-selected="false">母名</button>
            </div>
          </div>
          <div id="horse-board" class="letter-board tall" aria-label="馬名ボード"></div>
        </div>

        <div class="input-strip" aria-live="polite">
          <span id="current-target">入力</span>
          <strong id="current-input" class="placeholder">キーボードで直接入力できます</strong>
          <small id="input-hint">0/18文字 / 0/12</small>
          <input id="native-input" class="native-input" type="text" inputmode="kana" enterkeyhint="done" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="カタカナ入力">
        </div>
        <div class="hint-row" hidden>
          <button id="sire-hint-button" class="hint-button" type="button" hidden>1回消費してヒントを表示</button>
        </div>

        <div class="board-block pedigree-block">
          <div class="section-heading">
            <span>父</span>
          </div>
          <div id="sire-board" class="letter-board compact" aria-label="父ボード"></div>
        </div>

        <div class="board-block pedigree-block">
          <div class="section-heading">
            <span>母</span>
          </div>
          <div id="dam-board" class="letter-board compact" aria-label="母ボード"></div>
        </div>

        <section id="keyboard" class="keyboard" aria-label="かなキーボード"></section>
      </section>

      <aside id="stats-panel" class="stats-panel" aria-label="スコアと履歴"></aside>
    </main>
  </div>

  <dialog id="result-modal" class="result-modal">
    <form method="dialog" class="modal-shell">
      <button id="close-modal" class="icon-button close" type="button" aria-label="閉じる">×</button>
      <h2 id="modal-title">統計</h2>
      <div id="modal-body"></div>
      <button id="next-question" class="primary-button" type="button">次の問題へ</button>
    </form>
  </dialog>

  <dialog id="options-modal" class="options-modal">
    <form method="dialog" class="modal-shell options-shell">
      <button id="close-options" class="icon-button close" type="button" aria-label="閉じる">×</button>
      <h2>オプション</h2>
      <div class="options-panel">
        <label class="option-row switch-row">
          <span>簡単モード</span>
          <input id="easy-mode" type="checkbox">
        </label>
        <label class="option-row switch-row">
          <span>ヒントを表示しない</span>
          <input id="hide-hints" type="checkbox">
        </label>
        <label class="option-row">
          <span>次の問題から出題する年代を制限</span>
          <select id="decade-filter" class="option-select">
            <option value="all">制限なし</option>
            <option value="1990">1990年代以降</option>
            <option value="2000">2000年代以降</option>
            <option value="2010">2010年代以降</option>
            <option value="2020">2020年代以降</option>
          </select>
        </label>
        <label class="option-row">
          <span>G1勝利数</span>
          <select id="win-count-filter" class="option-select">
            <option value="all">制限無し</option>
            <option value="2">2勝</option>
            <option value="3">3勝</option>
            <option value="4">4勝</option>
            <option value="5plus">5勝以上</option>
          </select>
        </label>
        <button id="clear-history" class="secondary-button" type="button">履歴リセット</button>
      </div>
    </form>
  </dialog>

  <dialog id="easy-mode-prompt-modal" class="confirm-modal">
    <form method="dialog" class="confirm-shell">
      <h2>簡単モードで始めますか？</h2>
      <p>馬名の文字数が見えるようになり、挑戦回数は8回になります。父名ヒントは最初から使えます。</p>
      <div class="confirm-actions">
        <button id="decline-easy-mode" class="secondary-button" type="button">通常モード</button>
        <button id="accept-easy-mode" class="primary-button" type="button">簡単モード</button>
      </div>
    </form>
  </dialog>

  <dialog id="confirm-reset-modal" class="confirm-modal">
    <form method="dialog" class="confirm-shell">
      <h2>本当にリセットしますか？</h2>
      <p>現在の問題を失敗扱いにして、答えを表示します。</p>
      <div class="confirm-actions">
        <button id="cancel-reset-question" class="secondary-button" type="button">キャンセル</button>
        <button id="confirm-reset-question" class="primary-button danger" type="button">リセットする</button>
      </div>
    </form>
  </dialog>
</body>
</html>
