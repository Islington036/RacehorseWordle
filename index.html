<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles/base.css?v=20260608a">
  <link rel="stylesheet" href="styles/layout.css?v=20260608a">
  <link rel="stylesheet" href="styles/tiles.css?v=20260608a">
  <script defer src="data/questions.embedded.js?v=20260608a"></script>
  <script defer src="src/config.js?v=20260608a"></script>
  <script defer src="src/text.js?v=20260608a"></script>
  <script defer src="src/normalize.js?v=20260608a"></script>
  <script defer src="src/evaluator.js?v=20260608a"></script>
  <script defer src="src/kana-input.js?v=20260608a"></script>
  <script defer src="src/storage.js?v=20260608a"></script>
  <script defer src="src/options.js?v=20260608a"></script>
  <script defer src="src/question-picker.js?v=20260608a"></script>
  <script defer src="src/game-state.js?v=20260608a"></script>
  <script defer src="src/app-session.js?v=20260608a"></script>
  <script defer src="src/ui/constants.js?v=20260608a"></script>
  <script defer src="src/ui/renderers.js?v=20260608a"></script>
  <script defer src="src/ui/coordinator.js?v=20260608a"></script>
  <script defer src="src/main.js?v=20260608a"></script>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button id="options-button" class="icon-button" type="button" data-label="aria.optionsButton" data-title="title.optionsButton">
        <span aria-hidden="true">⚙</span>
      </button>
      <h1 data-text="app.title"></h1>
      <button id="reset-button" class="icon-button" type="button" data-label="aria.resetButton" data-title="title.resetButton">
        <span aria-hidden="true">↻</span>
      </button>
    </header>

    <div id="toast" class="toast" hidden></div>

    <main class="game-layout">
      <section class="play-area" data-label="aria.game">
        <div class="board-block horse-block">
          <div class="section-heading history-heading">
            <div id="history-tabs" class="history-tabs" role="tablist" data-label="aria.historyTabs">
              <button type="button" role="tab" data-history-target="horse" data-text="labels.horseName" aria-selected="true"></button>
              <button type="button" role="tab" data-history-target="sire" data-text="labels.sireName" aria-selected="false"></button>
              <button type="button" role="tab" data-history-target="dam" data-text="labels.damName" aria-selected="false"></button>
            </div>
          </div>
          <div id="horse-board" class="letter-board tall"></div>
        </div>

        <div class="input-strip" aria-live="polite">
          <span id="current-target" data-text="labels.input"></span>
          <strong id="current-input" class="placeholder" data-text="input.placeholder"></strong>
          <small id="input-hint"></small>
          <input id="native-input" class="native-input" type="text" inputmode="kana" enterkeyhint="done" autocomplete="off" autocapitalize="off" spellcheck="false" data-label="aria.nativeInput">
        </div>
        <div class="hint-row" hidden>
          <button id="sire-hint-button" class="hint-button" type="button" data-text="actions.sireHint" hidden></button>
        </div>

        <div class="board-block pedigree-block">
          <div class="section-heading">
            <span data-text="labels.sireShort"></span>
          </div>
          <div id="sire-board" class="letter-board compact"></div>
        </div>

        <div class="board-block pedigree-block">
          <div class="section-heading">
            <span data-text="labels.damShort"></span>
          </div>
          <div id="dam-board" class="letter-board compact"></div>
        </div>

        <section id="keyboard" class="keyboard" data-label="aria.keyboard"></section>
      </section>

      <aside id="stats-panel" class="stats-panel" data-label="aria.statsPanel"></aside>
    </main>
  </div>

  <dialog id="result-modal" class="result-modal">
    <form method="dialog" class="modal-shell">
      <button id="close-modal" class="icon-button close" type="button" data-label="aria.close">×</button>
      <h2 id="modal-title" data-text="modal.statsTitle"></h2>
      <div id="modal-body"></div>
      <button id="next-question" class="primary-button" type="button" data-text="actions.nextQuestion"></button>
    </form>
  </dialog>

  <dialog id="options-modal" class="options-modal">
    <form method="dialog" class="modal-shell options-shell">
      <button id="close-options" class="icon-button close" type="button" data-label="aria.close">×</button>
      <h2 data-text="options.title"></h2>
      <div class="options-panel">
        <label class="option-row switch-row">
          <span data-text="options.easyMode"></span>
          <input id="easy-mode" type="checkbox">
        </label>
        <label class="option-row switch-row">
          <span data-text="options.hideHints"></span>
          <input id="hide-hints" type="checkbox">
        </label>
        <label class="option-row">
          <span data-text="options.decadeFilter"></span>
          <select id="decade-filter" class="option-select"></select>
        </label>
        <label class="option-row">
          <span data-text="options.winCountFilter"></span>
          <select id="win-count-filter" class="option-select"></select>
        </label>
        <button id="clear-history" class="secondary-button" type="button" data-text="actions.clearHistory"></button>
      </div>
    </form>
  </dialog>

  <dialog id="easy-mode-prompt-modal" class="confirm-modal">
    <form method="dialog" class="confirm-shell">
      <h2 data-text="easyModePrompt.title"></h2>
      <p data-text="easyModePrompt.body"></p>
      <div class="confirm-actions">
        <button id="decline-easy-mode" class="secondary-button" type="button" data-text="actions.normalMode"></button>
        <button id="accept-easy-mode" class="primary-button" type="button" data-text="actions.easyMode"></button>
      </div>
    </form>
  </dialog>

  <dialog id="confirm-reset-modal" class="confirm-modal">
    <form method="dialog" class="confirm-shell">
      <h2 data-text="resetConfirm.title"></h2>
      <p data-text="resetConfirm.body"></p>
      <div class="confirm-actions">
        <button id="cancel-reset-question" class="secondary-button" type="button" data-text="actions.cancel"></button>
        <button id="confirm-reset-question" class="primary-button danger" type="button" data-text="actions.reset"></button>
      </div>
    </form>
  </dialog>
</body>
</html>
