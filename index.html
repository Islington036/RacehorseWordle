<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Racehorse Wordle</title>
  <link rel="stylesheet" href="styles/base.css?v=20260605c">
  <link rel="stylesheet" href="styles/layout.css?v=20260605c">
  <link rel="stylesheet" href="styles/wordle.css?v=20260605c">
  <script defer src="data/questions.embedded.js?v=20260605c"></script>
  <script defer src="src/config.js?v=20260605c"></script>
  <script defer src="src/normalize.js?v=20260605c"></script>
  <script defer src="src/evaluator.js?v=20260605c"></script>
  <script defer src="src/kana-input.js?v=20260605c"></script>
  <script defer src="src/storage.js?v=20260605c"></script>
  <script defer src="src/question-picker.js?v=20260605c"></script>
  <script defer src="src/game-state.js?v=20260605c"></script>
  <script defer src="src/ui.js?v=20260605c"></script>
  <script defer src="src/main.js?v=20260605c"></script>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button id="stats-button" class="icon-button" type="button" aria-label="統計を表示" title="統計">
        <span aria-hidden="true">▥</span>
      </button>
      <h1>Racehorse Wordle</h1>
      <button id="reset-button" class="icon-button" type="button" aria-label="別の問題を出題" title="別の問題">
        <span aria-hidden="true">↻</span>
      </button>
    </header>

    <div id="toast" class="toast" hidden></div>

    <main class="game-layout">
      <section class="play-area" aria-label="ゲーム">
        <div class="board-block horse-block">
          <div class="section-heading">
            <span>馬名</span>
          </div>
          <div id="horse-board" class="wordle-board tall" aria-label="馬名ボード"></div>
        </div>

        <div class="input-strip" aria-live="polite">
          <span id="current-target">入力</span>
          <strong id="current-input" class="placeholder">入力待ち</strong>
          <small id="input-hint">0/18文字 / 0/15</small>
          <input id="native-input" class="native-input" type="text" inputmode="kana" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="カタカナ入力">
        </div>

        <div class="board-block pedigree-block">
          <div class="section-heading">
            <span>父</span>
          </div>
          <div id="sire-board" class="wordle-board compact" aria-label="父ボード"></div>
        </div>

        <div class="board-block pedigree-block">
          <div class="section-heading">
            <span>母</span>
          </div>
          <div id="dam-board" class="wordle-board compact" aria-label="母ボード"></div>
        </div>

        <section id="keyboard" class="keyboard" aria-label="かなキーボード"></section>
      </section>

      <aside id="stats-panel" class="stats-panel" aria-label="スコアと履歴"></aside>
    </main>
  </div>

  <dialog id="result-modal" class="result-modal">
    <form method="dialog" class="modal-shell">
      <button id="close-modal" class="icon-button close" type="button" aria-label="閉じる">×</button>
      <h2 id="modal-title">統計</h2>
      <div id="modal-body"></div>
      <button id="next-question" class="primary-button" type="button">次の問題</button>
    </form>
  </dialog>
</body>
</html>
